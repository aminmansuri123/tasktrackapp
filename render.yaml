# Render Blueprint — place this file at the repository root when deploying from GitHub.
services:
  - type: web
    name: tasktrack-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_ORIGIN
        sync: false
      - key: MASTER_EMAIL
        sync: false
      - key: MASTER_PASSWORD
        sync: false
